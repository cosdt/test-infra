name: "Checkout PyTorch PR"
description: >
  Checks out the upstream PyTorch PR commit into the downstream workspace
  based on the `repository_dispatch` client_payload fields. This action
  encapsulates all git logic so downstream repos do not need to parse the
  payload or run git commands themselves.

inputs:
  upstream-repo:
    description: >
      Upstream repository in "owner/repo" form.
      Defaults to the value forwarded in the repository_dispatch payload.
    required: true
    default: ${{ github.event.client_payload.upstream_repo }}
  commit-sha:
    description: >
      The exact commit SHA to check out from the upstream repo.
      Defaults to the value forwarded in the repository_dispatch payload.
    required: true
    default: ${{ github.event.client_payload.commit_sha }}
  path:
    description: >
      Relative path under $GITHUB_WORKSPACE where the upstream repo will be
      placed. Defaults to "pytorch".
    required: false
    default: "pytorch"
  token:
    description: >
      Personal access token (PAT) or installation token used to authenticate
      against the upstream repository. Falls back to the built-in GITHUB_TOKEN
      for public repositories.
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Check out upstream commit
      shell: bash
      env:
        UPSTREAM_REPO: ${{ inputs.upstream-repo }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        CHECKOUT_PATH: ${{ inputs.path }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        echo "::group::Checkout ${UPSTREAM_REPO}@${COMMIT_SHA} → ${CHECKOUT_PATH}"

        # Initialise a bare-minimum local repo to avoid fetching the full history.
        mkdir -p "${CHECKOUT_PATH}"
        cd "${CHECKOUT_PATH}"
        git init
        git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${UPSTREAM_REPO}.git"

        # GitHub supports single-SHA fetches via the partial-clone protocol when
        # uploadpack.allowDirectFetch is enabled on the remote (it is for github.com).
        git fetch --depth=1 origin "${COMMIT_SHA}"
        git checkout FETCH_HEAD

        echo "Checked out ${UPSTREAM_REPO} at $(git rev-parse HEAD)"
        echo "::endgroup::"
