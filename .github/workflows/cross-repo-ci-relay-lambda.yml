name: cross-repo-ci-relay lambda

on:
  pull_request:
    branches:
      - l1l2-cjh
      - main
    paths:
      - .github/workflows/cross-repo-ci-relay-lambda.yml
      - aws/lambda/cross_repo_ci_relay/**
  push:
    branches:
      - main
      - package-workflow
    paths:
      - .github/workflows/cross-repo-ci-relay-lambda.yml
      - aws/lambda/cross_repo_ci_relay/**
  # Allow manual trigger from the Actions tab in GitHub UI
  workflow_dispatch:  

defaults:
  run:
    working-directory: aws/lambda/cross_repo_ci_relay/

jobs:
  # -----------------------------------------------------------------------
  # Build both deployment zips and upload them as artifacts so that PRs can
  # verify the packages are buildable before merging.
  # -----------------------------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Build webhook zip
        run: make prepare-webhook

      - name: Build result zip
        run: make prepare-result

      - name: Upload webhook artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cross_repo_ci_webhook
          path: aws/lambda/cross_repo_ci_relay/webhook/deployment.zip
          retention-days: 7

      - name: Upload result artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cross_repo_ci_result
          path: aws/lambda/cross_repo_ci_relay/result/deployment.zip
          retention-days: 7

  # -----------------------------------------------------------------------
  # Deploy to AWS Lambda — only runs on pushes to main.
  # -----------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@67fbcbb121271f7775d2e7715933280b06314838 # v1.7.0
        with:
          # role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_cross-repo-ci-relay-lambda
          # aws-region: us-east-1
          role-to-assume: arn:aws:iam::769187320733:role/gha_workflow_cross-repo-ci-relay-lambda
          aws-region: ap-southeast-1

      - name: Deploy webhook lambda
        run: make deploy-webhook

      - name: Deploy result lambda
        run: make deploy-result
